name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: travelai
          POSTGRES_USER: travelai
          POSTGRES_PASSWORD: travelai
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U travelai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgres://travelai:travelai@localhost:5432/travelai
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - run: ruff check .
      - run: pytest --cov=apps --cov-report=term-missing
